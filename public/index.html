<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Household Hub</title>
  <link rel="manifest" href="/manifest.webmanifest" />
  <link rel="icon" href="/icon.svg" type="image/svg+xml" />
  <link rel="apple-touch-icon" href="/icon.svg" />
  <meta name="theme-color" content="#111111" />
  <link rel="stylesheet" href="/styles.css?v=hub-pwa-33" />
</head>
<body>
  <div class="app-shell">
    <aside class="sidebar" aria-label="Workspace navigation">
      <a class="brand" href="/home" aria-label="Household Hub home">
        <span class="brand-mark" aria-hidden="true"><img src="/house-logo.svg" alt="" /></span>
        <span><strong>Fite Family</strong><small>Household hub</small></span>
      </a>
      <div class="profile-switcher" id="profile-switcher" aria-label="Active profile">
        <span class="profile-pill">Family</span>
        <select id="profile-select" aria-label="Switch household profile"></select>
      </div>
      <nav aria-label="Main views" class="sticky-hub-nav" data-module-nav>
        <p class="nav-group-label">Household</p>
        <a href="/home" data-nav="/home"><span>🏠</span> Home</a>
        <a href="/calendar" data-nav="/calendar"><span>📅</span> Calendar</a>
        <a href="/grocery" data-nav="/grocery"><span>🛒</span> Grocery</a>
        <a href="/documents" data-nav="/documents"><span>📄</span> Docs</a>
        <a href="/chat" data-nav="/chat"><span>💬</span> Chat</a>
        <p class="nav-group-label">Tasks</p>
        <a href="/today" data-nav="/today"><span>◷</span> Today</a>
        <a href="/inbox" data-nav="/inbox"><span>↧</span> Inbox</a>
        <a href="/future" data-nav="/future"><span>▣</span> Future</a>
        <a href="/projects" data-nav="/projects"><span>▦</span> Projects</a>
        <a href="/done" data-nav="/done"><span>✓</span> Done</a>
      </nav>
      <div class="sidebar-note">
        <strong>Quick keys</strong>
        <span>N add · 1 Home · 2 Today · 3 Calendar · 4 Grocery</span>
      </div>
    </aside>

    <section class="workspace">
      <header class="topbar">
        <div class="mobile-greeting">
          <strong>Household Hub</strong>
          <span>Calendar, tasks, grocery, docs</span>
        </div>
        <div class="breadcrumb">Fite Family <span>/</span> Home</div>
        <div class="topbar-actions" aria-label="View tools">
          <select id="top-profile-select" aria-label="Switch household profile"></select>
        </div>
      </header>

      <main>
        <section class="composer quick-add" aria-label="Quick capture">
          <input id="new-title" placeholder="Capture task, grocery, note…" autofocus />
          <input id="new-project" placeholder="Project" list="project-options" />
          <input id="new-due" type="date" aria-label="Due date" />
          <select id="new-recurrence" aria-label="Repeat">
            <option value="none">No repeat</option>
            <option value="daily">Daily</option>
            <option value="weekly">Weekly</option>
            <option value="monthly">Monthly</option>
          </select>
          <button id="add">Add</button>
          <button class="mobile-add-panel" type="button" aria-hidden="true">Add</button>
          <datalist id="project-options"></datalist>
        </section>
        <section id="content"></section>
      </main>
    </section>
  </div>

  <button class="fab-add" type="button" aria-label="Capture item">+</button>

  <script src="/app.js?v=hub-pwa-33" type="module"></script>
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => navigator.serviceWorker.register('/service-worker.js'));
    }
  </script>
</body>
</html>
